name: Sync GitHub Projects Feed

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      username:
        description: GitHub username override
        required: false
        type: string
      limit:
        description: Max project count override
        required: false
        type: string
      include_homepage_any_domain:
        description: Include repos with any homepage URL
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      include_project_boards:
        description: Include public GitHub Projects boards
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      project_board_limit:
        description: How many boards to fetch before final truncation
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GITHUB_SYNC_USERNAME: ${{ inputs.username || vars.GITHUB_SYNC_USERNAME || 'ttoriaa' }}
      GITHUB_SYNC_LIMIT: ${{ inputs.limit || vars.GITHUB_SYNC_LIMIT || '9' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_SYNC_INCLUDE_HOMEPAGE_ANY_DOMAIN: ${{ inputs.include_homepage_any_domain || vars.GITHUB_SYNC_INCLUDE_HOMEPAGE_ANY_DOMAIN || 'false' }}
      GITHUB_SYNC_INCLUDE_PROJECT_BOARDS: ${{ inputs.include_project_boards || vars.GITHUB_SYNC_INCLUDE_PROJECT_BOARDS || 'true' }}
      GITHUB_SYNC_PROJECT_BOARD_LIMIT: ${{ inputs.project_board_limit || vars.GITHUB_SYNC_PROJECT_BOARD_LIMIT || '20' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh projects feed
        run: |
          EXTRA_ARGS=""
          if [ "$(echo "${GITHUB_SYNC_INCLUDE_HOMEPAGE_ANY_DOMAIN}" | tr '[:upper:]' '[:lower:]')" = "true" ] || [ "$(echo "${GITHUB_SYNC_INCLUDE_HOMEPAGE_ANY_DOMAIN}" | tr '[:upper:]' '[:lower:]')" = "1" ] || [ "$(echo "${GITHUB_SYNC_INCLUDE_HOMEPAGE_ANY_DOMAIN}" | tr '[:upper:]' '[:lower:]')" = "yes" ]; then
            EXTRA_ARGS="--include-homepage-any-domain"
          fi

          EXTRA_BOARD_ARGS=""
          if [ "$(echo "${GITHUB_SYNC_INCLUDE_PROJECT_BOARDS}" | tr '[:upper:]' '[:lower:]')" = "true" ] || [ "$(echo "${GITHUB_SYNC_INCLUDE_PROJECT_BOARDS}" | tr '[:upper:]' '[:lower:]')" = "1" ] || [ "$(echo "${GITHUB_SYNC_INCLUDE_PROJECT_BOARDS}" | tr '[:upper:]' '[:lower:]')" = "yes" ]; then
            EXTRA_BOARD_ARGS="--include-project-boards --project-board-limit ${GITHUB_SYNC_PROJECT_BOARD_LIMIT}"
          fi

          python scripts/sync_github_projects.py --username "$GITHUB_SYNC_USERNAME" --output assets/github-projects.json --limit "$GITHUB_SYNC_LIMIT" $EXTRA_ARGS $EXTRA_BOARD_ARGS

      - name: Commit changes
        run: |
          if git diff --quiet -- assets/github-projects.json; then
            echo "No feed changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-projects.json
          git commit -m "chore: sync GitHub projects feed"
          git push