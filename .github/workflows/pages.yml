name: Deploy Portfolio Landing

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.GLM_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || vars.GLM_BASE_URL || 'https://open.bigmodel.cn/api/paas/v4' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build skills catalog
        run: |
          python3 scripts/build_skills_catalog.py --repo ttoriaa/vikipedia --output assets/skills-catalog.json

      - name: Prepare site artifact
        run: |
          rm -rf out
          mkdir -p out/assets/landing-previews
          test -d site
          cp -R site/. out/
          if [ -d market_watch ]; then
            cp -R market_watch out/market_watch
          fi
          cp index.html out/index.html
          if [ -f ai_hardware_industry_chain_dashboard.html ]; then
            cp ai_hardware_industry_chain_dashboard.html out/ai_hardware_industry_chain_dashboard.html
          fi
          if [ -f c7_regulation_tabs.html ]; then
            cp c7_regulation_tabs.html out/c7_regulation_tabs.html
          fi
          if [ -d assets/landing-previews ]; then
            cp assets/landing-previews/*.png out/assets/landing-previews/
          fi
          if [ -f assets/profile.jpg ]; then
            cp assets/profile.jpg out/assets/profile.jpg
          fi
          if [ -f assets/github-projects.json ]; then
            cp assets/github-projects.json out/assets/github-projects.json
          fi
          if [ -f assets/skills-catalog.json ]; then
            cp assets/skills-catalog.json out/assets/skills-catalog.json
          fi
          if [ -d assets/token ]; then
            mkdir -p out/assets
            cp -R assets/token out/assets/token
          fi
          if [ -d assets/ai-hardware-industry-chain ]; then
            mkdir -p out/assets
            cp -R assets/ai-hardware-industry-chain out/assets/ai-hardware-industry-chain
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
