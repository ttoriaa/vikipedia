<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Charging Dashboard</title>

  <style>
    :root {
      --bg1: #fff6eb;
      --bg2: #edf5ff;
      --ink: #12202b;
      --muted: #5d6874;
      --line: rgba(18, 32, 43, 0.14);
      --card: rgba(255, 255, 255, 0.88);
      --accent: #c55300;
      --accent-2: #ff8a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 480px at 0% 0%, #ffd9b7 0%, transparent 55%),
        radial-gradient(1000px 520px at 100% 10%, #c4e0ff 0%, transparent 55%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 20px;
    }
    .shell { max-width: 1280px; margin: 0 auto; }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 12px 30px rgba(0,0,0,.06);
    }
    .nav a {
      text-decoration: none;
      color: var(--ink);
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 600;
      font-size: 14px;
    }
    .nav a.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 16px 42px rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 8px; font-size: 34px; }
    h2 { margin: 0 0 8px; font-size: 22px; }
    .sub { color: var(--muted); line-height: 1.7; margin: 6px 0 0; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-top: 14px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      margin-top: 14px;
    }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { border-bottom: 1px solid #edf0f3; padding: 8px 10px; text-align: left; white-space: nowrap; }
    th { position: sticky; top: 0; background: #f8fafc; z-index: 1; }
    .frame {
      width: 100%;
      height: min(78vh, 920px);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      margin-top: 12px;
    }
    .foot { margin-top: 12px; color: var(--muted); font-size: 12px; }
    @media (max-width: 700px) {
      body { padding: 10px; }
      h1 { font-size: 26px; }
      .frame { height: min(68vh, 680px); }
    }
  </style>

</head>
<body>
  <div class="shell">
    <nav class="nav"><a class="" href="index.html">首页简介</a><a class="" href="data.html">数据表</a><a class="active" href="dashboard.html">可视化</a><a class="" href="insights.html">趋势总结</a></nav>
    <section class="panel">
      <h1>可视化 Dashboard</h1>
      <p class="sub">该可视化由数据表页同源数据自动生成，用于快速观察车型分布、充电效率与关键指标差异。</p>
      <div class="meta">
        <span class="pill">数据日期: 2026-06-22</span>
        <span class="pill">来源: data.html 同批数据</span>
      </div>
      <iframe class="frame" src="reports/2026-06-22/charging_visualization_dashboard.html" title="Charging Dashboard"></iframe>
    </section>
  </div>
</body>
</html>
