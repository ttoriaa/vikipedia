<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Charging Dashboard</title>

  <style>
    :root {
      --bg1: #fff6eb;
      --bg2: #edf5ff;
      --ink: #12202b;
      --muted: #5d6874;
      --line: rgba(18, 32, 43, 0.14);
      --card: rgba(255, 255, 255, 0.88);
      --accent: #c55300;
      --accent-2: #ff8a00;
      --viki-font-body: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --viki-brand-solid: #c55300;
      --viki-brand-ink: #ffffff;
      --viki-brand-grad: linear-gradient(135deg, var(--accent), var(--accent-2));
      --viki-shadow-launcher: 0 16px 34px rgba(18, 32, 43, 0.24);
      --viki-shadow-panel: 0 24px 56px rgba(18, 32, 43, 0.28);
      --viki-widget-text: #f5f9ff;
      --viki-widget-muted: #cad8eb;
      --viki-widget-muted-2: #d8e4f3;
      --viki-widget-muted-3: #c2d1e6;
      --viki-widget-line-strong: rgba(255, 255, 255, 0.34);
      --viki-widget-line: rgba(255, 255, 255, 0.24);
      --viki-widget-line-soft: rgba(255, 255, 255, 0.18);
      --viki-widget-line-faint: rgba(255, 255, 255, 0.14);
      --viki-widget-panel-bg: linear-gradient(160deg, rgba(18, 35, 61, 0.97), rgba(11, 23, 42, 0.95));
      --viki-widget-btn-bg: rgba(16, 31, 53, 0.9);
      --viki-widget-btn-text: #f0f6ff;
      --viki-widget-intro-bg: rgba(28, 52, 84, 0.7);
      --viki-widget-chip-bg: rgba(17, 38, 67, 0.88);
      --viki-widget-chip-text: #ecf3ff;
      --viki-widget-select-bg: rgba(12, 26, 47, 0.96);
      --viki-widget-lang-bg: rgba(13, 24, 44, 0.94);
      --viki-widget-messages-bg: rgba(8, 18, 34, 0.84);
      --viki-widget-msg-bg: rgba(24, 49, 81, 0.85);
      --viki-widget-msg-user-bg: rgba(197, 83, 0, 0.28);
      --viki-widget-msg-error-bg: rgba(179, 38, 73, 0.36);
      --viki-widget-input-bg: rgba(9, 20, 39, 0.95);
      --viki-widget-input-text: #f3f7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--viki-font-body);
      color: var(--ink);
      background:
        radial-gradient(900px 480px at 0% 0%, #ffd9b7 0%, transparent 55%),
        radial-gradient(1000px 520px at 100% 10%, #c4e0ff 0%, transparent 55%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 20px;
    }
    .shell { max-width: 1280px; margin: 0 auto; }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 12px 30px rgba(0,0,0,.06);
    }
    .nav a {
      text-decoration: none;
      color: var(--ink);
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 600;
      font-size: 14px;
    }
    .nav a.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 16px 42px rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 8px; font-size: 34px; }
    h2 { margin: 0 0 8px; font-size: 22px; }
    .sub { color: var(--muted); line-height: 1.7; margin: 6px 0 0; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-top: 14px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      margin-top: 14px;
    }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { border-bottom: 1px solid #edf0f3; padding: 8px 10px; text-align: left; white-space: nowrap; }
    th { position: sticky; top: 0; background: #f8fafc; z-index: 1; }
    .frame {
      width: 100%;
      height: min(78vh, 920px);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      margin-top: 12px;
    }
    .foot { margin-top: 12px; color: var(--muted); font-size: 12px; }
    @media (max-width: 700px) {
      body { padding: 10px; }
      h1 { font-size: 26px; }
      .frame { height: min(68vh, 680px); }
    }
  </style>

</head>
<body>
  <div class="shell">
    <nav class="nav"><a class="" href="index.html">首页简介</a><a class="" href="data.html">数据表</a><a class="active" href="dashboard.html">可视化</a><a class="" href="insights.html">趋势总结</a></nav>
    <section class="panel">
      <h1>可视化 Dashboard</h1>
      <p class="sub">该可视化由数据表页同源数据自动生成，用于快速观察车型分布、充电效率与关键指标差异。</p>
      <div class="meta">
        <span class="pill">数据日期: 2026-07-08</span>
        <span class="pill">来源: data.html 同批数据</span>
        <span class="pill">AI Assistant: GLM</span>
      </div>
      <iframe class="frame" src="reports/2026-07-08/charging_visualization_dashboard.html" title="Charging Dashboard"></iframe>
      <p class="foot">AI Assistant 通过后端代理调用 GLM，页面端不保存也不暴露 API Key。</p>
    </section>
  </div>
  <script>
    (function () {
      window.__VIKI_ASSISTANT_CONFIG__ = {
        endpoint: "https://resume-tailor-1x7i.onrender.com/api/assistant/query",
        method: "POST",
        protocol: "assistant_query",
        provider: "glm",
        model: "glm-4.5-flash",
        stream: false,
        context: "Charging Dashboard (automotive-benchmarking)",
        titleZh: "充电助手",
        titleEn: "Charging Copilot",
        launcherZh: "充电助手",
        launcherEn: "Charging Copilot",
        answerPaths: [
          "answer",
          "output_text",
          "choices.0.message.content"
        ]
      };
    })();
  </script>
  <script src="assistant-widget.js?v=20260708-shared-tokens"></script>
</body>
</html>
